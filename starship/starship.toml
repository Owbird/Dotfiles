# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

# Clean two-line prompt: info line + input line
format = """
$username$hostname$directory$git_branch$git_status$cmd_duration
$character"""

[character]
success_symbol = '[❯](bold #00e676)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold #00e676)'

[directory]
style = "bold #00e676"
truncation_length = 100
truncate_to_repo = false
read_only = " 󰌾"
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = ""
style = "dimmed white"
format = "[$symbol $branch]($style) "

[git_status]
style = "green"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "✖"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "≡"
modified = "~"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 2_000
style = "dimmed green"
format = "[ $duration]($style)"

[hostname]
ssh_only = false
style = "dimmed white"
format = "[$hostname]($style) in "

[username]
show_always = true
style_user = "bold #00e676"
style_root = "bold red"
format = "[$user]($style)[@](dimmed white)"

[python]
symbol = " "
style = "dimmed green"
format = '[$symbol$version(\($virtualenv\))]($style) '
detect_extensions = ['py']

[nodejs]
symbol = " "
style = "dimmed green"
format = '[$symbol$version]($style) '

[rust]
symbol = " "
style = "dimmed green"
format = '[$symbol$version]($style) '

[package]
disabled = true

[line_break]
disabled = true
